name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop
      - "feature/**"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-and-tests:
    name: Lint, format, and test
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install "uv==0.11.21"
          uv sync --frozen --all-groups

      - name: Validate deployment configuration and dependency pins
        run: uv run python scripts/validate_deployment.py

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      - name: Run tests
        run: uv run pytest

  dashboard-quality:
    name: Dashboard lint, test, and build
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    defaults:
      run:
        working-directory: dashboard
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.23.1"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install locked dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Type-check dashboard
        run: npm run lint

      - name: Test dashboard
        run: npm test

      - name: Build dashboard
        run: npm run build

  container-build:
    name: Validate Compose and build images
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate Compose configuration
        run: docker compose config --quiet

      - name: Build application images
        run: docker compose build

      - name: Run infrastructure smoke test
        env:
          SMOKE_SKIP_BUILD: "true"
          SMOKE_REMOVE_VOLUMES: "true"
        run: bash scripts/smoke.sh
