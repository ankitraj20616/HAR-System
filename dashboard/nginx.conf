map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    server_name _;
    # Resolve Compose service names for every backend lifetime. Without Docker's
    # embedded resolver, nginx can retain a stale container IP after `dev.sh up`
    # recreates a backend while leaving the dashboard container running.
    resolver 127.0.0.11 valid=10s ipv6=off;
    root /usr/share/nginx/html;
    index index.html;

    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "healthy\n";
    }

    location ^~ /api/feedback/ {
        set $auth_upstream auth-service:8005;
        proxy_pass http://$auth_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /api/ {
        set $auth_upstream auth-service:8005;
        proxy_pass http://$auth_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /ws {
        set $auth_upstream auth-service:8005;
        proxy_pass http://$auth_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 75s;
    }

    location = /feedback-ws {
        set $auth_upstream auth-service:8005;
        proxy_pass http://$auth_upstream/feedback-ws$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 1h;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
